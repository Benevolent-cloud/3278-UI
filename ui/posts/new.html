<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Post</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>



  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-xl p-6">
      <div class="rounded-3xl bg-white p-6 shadow-sm ring-1 ring-slate-200">
        <h1 class="text-2xl font-semibold mb-4">Create a Post</h1>
        <form action="YOUR_POST_ENDPOINT_URL" method="post" enctype="multipart/form-data" class="space-y-4">
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Upload image</span>
            <input
              type="file"
              name="image"
              accept="image/*"
              class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none file:mr-4 file:rounded-2xl file:border-0 file:bg-slate-200 file:px-4 file:py-2 file:text-sm file:font-medium file:text-slate-700 focus:border-sky-500 focus:ring-2 focus:ring-sky-100"
              required
            />
          </label>
          <label class="block">
            <span class="text-sm font-medium text-slate-700">Post text</span>
            <textarea
              name="text"
              rows="5"
              placeholder="Write your post content here..."
              class="mt-1 w-full rounded-2xl border border-slate-200 bg-slate-50 px-4 py-3 text-slate-900 outline-none focus:border-sky-500 focus:ring-2 focus:ring-sky-100"
              required
            ></textarea>
          </label>
          <button
            type="submit"
            class="inline-flex items-center justify-center rounded-2xl bg-sky-600 px-5 py-3 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-700"
          >
            Publish Post
          </button>
        </form>
      </div>
    </main>
  </body>


  
</html>
