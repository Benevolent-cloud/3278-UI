<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Flowbite CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.css" rel="stylesheet" />

    <!-- Flowbite JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.0.0/dist/flowbite.min.js"></script>

    <style>
        .form-container {
            min-height: 100vh;
        }
    </style>
</head>

<body class="bg-gray-50">
    <div class="form-container flex items-center justify-center px-4 py-12 sm:px-6 lg:px-8">
        <div class="w-full max-w-md">
            <!-- Logo/Title -->
            <div class="text-center mb-8">
                <h2 class="text-3xl font-bold text-gray-900">Welcome</h2>
                <p class="mt-2 text-sm text-gray-600">Sign in to your account or create a new one</p>
            </div>

            <!-- Flowbite Tabs -->
            <div class="bg-white shadow-md rounded-lg">
                <div class="border-b border-gray-200">
                    <nav class="flex space-x-8 px-6" aria-label="Tabs" role="tablist" data-tabs-toggle="#tab-content">
                            <button id="login-tab" type="button"
                                class="py-4 px-1 border-b-2 font-medium text-sm rounded-t-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 text-blue-600 border-blue-500"
                                data-tabs-target="#login" role="tab" aria-controls="login" aria-selected="true">
                                Sign In
                            </button>
                            <button id="signup-tab" type="button"
                                class="py-4 px-1 border-b-2 font-medium text-sm rounded-t-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 text-gray-500 hover:text-gray-700 border-gray-200 hover:border-gray-300"
                                data-tabs-target="#signup" role="tab" aria-controls="signup" aria-selected="false">
                                Sign Up
                            </button>
                    </nav>
                </div>

                <div id="tab-content" class="p-6">
                    <!-- Login Tab Content -->
                    <div id="login" role="tabpanel" aria-labelledby="login-tab">
                        <form action="/login" method="POST" class="space-y-6">
                            <div>
                                <label for="login-email" class="block text-sm font-medium text-gray-700 mb-2">
                                    Email address
                                </label>
                                <input type="email" id="login-email" name="email" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Enter your email">
                            </div>

                            <div>
                                <label for="login-password" class="block text-sm font-medium text-gray-700 mb-2">
                                    Password
                                </label>
                                <input type="password" id="login-password" name="password" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Enter your password">
                            </div>

                            <div>
                                <button type="submit"
                                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Sign in
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Sign Up Tab Content -->
                    <div id="signup" class="hidden" role="tabpanel" aria-labelledby="signup-tab">
                        <form action="/signup" method="POST" class="space-y-6">
                            <div>
                                <label for="signup-name" class="block text-sm font-medium text-gray-700 mb-2">
                                    Username
                                </label>
                                <input type="text" id="signup-name" name="name" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Enter your username">
                            </div>

                            <div>
                                <label for="signup-email" class="block text-sm font-medium text-gray-700 mb-2">
                                    Email address
                                </label>
                                <input type="email" id="signup-email" name="email" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Enter your email">
                            </div>

                            <div>
                                <label for="signup-password" class="block text-sm font-medium text-gray-700 mb-2">
                                    Password
                                </label>
                                <input type="password" id="signup-password" name="password" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                    placeholder="Create a password">
                            </div>

                            <div>
                                <button type="submit"
                                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                                    Sign up
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
